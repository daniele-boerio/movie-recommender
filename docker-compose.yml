services:
  # ── Frontend (Nginx + React build) ──
  # Coolify routes external traffic here via Traefik
  frontend:
    build: ./frontend
    environment:
      - SERVICE_FQDN_FRONTEND
    depends_on:
      - backend
    healthcheck:
      # 127.0.0.1 e non localhost: nginx.conf fa solo `listen 80` (IPv4), mentre dentro
      # il container localhost risolve prima su ::1 e busybox wget non ripiega su IPv4.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend (FastAPI) ──
  # Nessun dominio pubblico: ci parla solo nginx, via rete Docker interna.
  # Il Postgres è una risorsa Coolify separata: niente servizio `db` qui, le DB_*
  # vanno impostate nelle Environment Variables di Coolify e la risorsa Postgres
  # deve stare sulla stessa rete Docker di questo stack.
  backend:
    build: ./backend
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
    healthcheck:
      # Anche qui 127.0.0.1: urllib ripiega su IPv4 da solo, ma tanto vale non
      # dipendere da quel fallback visto che uvicorn ascolta solo su IPv4.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
