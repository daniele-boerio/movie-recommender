[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# L'URL non sta qui: alembic/env.py lo prende da app.config, così esiste una sola
# fonte di verità per le credenziali (le env var / il .env) e non si duplica qui
# un segreto che finirebbe committato.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
